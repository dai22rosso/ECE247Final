# @package _global_
module:
  _target_: emg2qwerty.lightning.CNNRNNCTCModule  
  in_features: 528
  mlp_features: [384]
  
  block_channels: [24, 24]
  kernel_width: 32
  
  nonlinearity: "relu"  
  hidden_size: 256      
  num_layers: 2        
  bidirectional: true
  dropout: 0.25        

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 4000
  padding: [1800, 200]