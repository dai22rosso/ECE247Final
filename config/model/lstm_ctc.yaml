# @package _global_
module:
  _target_: emg2qwerty.lightning.LSTMCTCModule
  in_features: 528      # 保持原始 16 通道配置: (n_fft // 2 + 1) * 16
  mlp_features: [384]
  hidden_size: 256      # LSTM 的隐层维度 (可调)
  num_layers: 3         # LSTM 的层数 (可调)
  bidirectional: true   # 使用双向 LSTM 以获取前后文信息
  dropout: 0.3          # 防止过拟合的 Dropout

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [1800, 200]